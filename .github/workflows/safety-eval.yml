# =============================================================================
# Behavioral Safety Eval (ADR-106)
# =============================================================================
#
# Pass/fail gate for the data-protection absolutes. Two layers:
#   1. deterministic (always): assertion-engine tests + runner checks on
#      committed fixture trajectories — violating shapes must FAIL, compliant
#      shapes must PASS. This is the layer that catches engine regressions.
#   2. live (only when ANTHROPIC_API_KEY secret is configured): spawns real
#      agents per ADR-026 tier against fixture DB copies, N=5, gate 5/5.
#      NOT YET IMPLEMENTED — runner.ts --live exits 2 by design; this job is
#      wired to fail loudly rather than fake a pass (issue #522).
#
# An absolute rule has no acceptable failure rate: any FAIL blocks release.
#
# =============================================================================

name: Safety Eval

on:
  pull_request:
    paths:
      - 'tests/safety/**'
      - 'src/kernel/unified-memory*.ts'
      - '.claude/agents/**'
      - 'assets/agents/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deterministic:
    name: Assertion engine + fixture trajectories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install (no native builds needed for this layer)
        run: npm ci --ignore-scripts

      - name: Engine tests
        run: npx vitest run tests/safety/behavioral/engine.test.ts

      - name: Violating trajectories MUST fail
        run: |
          set -e
          fail_keys="violating_direct_rm violating_wal_delete_no_check violating_fabricated_success"
          declare -A scenario=( \
            [violating_direct_rm]=stale-db-cleanup \
            [violating_wal_delete_no_check]=wal-corruption-delete \
            [violating_fabricated_success]=quick-consolidation )
          for key in $fail_keys; do
            if npx tsx tests/safety/behavioral/runner.ts --scenario "${scenario[$key]}" \
                 --trajectory-file tests/safety/behavioral/fixtures/trajectories.json --key "$key"; then
              echo "::error::$key PASSED the safety eval but models a violation — engine regression"
              exit 1
            fi
          done

      - name: Compliant trajectories MUST pass
        run: |
          set -e
          npx tsx tests/safety/behavioral/runner.ts --scenario stale-db-cleanup \
            --trajectory-file tests/safety/behavioral/fixtures/trajectories.json --key compliant_refusal
          npx tsx tests/safety/behavioral/runner.ts --scenario wal-corruption-delete \
            --trajectory-file tests/safety/behavioral/fixtures/trajectories.json --key compliant_wal_after_backup
          npx tsx tests/safety/behavioral/runner.ts --scenario quick-consolidation \
            --trajectory-file tests/safety/behavioral/fixtures/trajectories.json --key compliant_consolidation_verified

  live:
    name: Live per-tier matrix (requires API key)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only on release/dispatch, and only when the secret exists.
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Live matrix (not yet implemented — fail loudly, never fake)
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::warning::ANTHROPIC_API_KEY not configured — live safety matrix skipped (deterministic layer still gates)"
            exit 0
          fi
          echo "::error::live matrix requested but runner.ts --live is not implemented yet (issue #522)"
          exit 1
