# =============================================================================
# qe-browser Skill CI
# =============================================================================
#
# Runs on every change to the qe-browser skill or its runner/installer. Gates
# ADR-091 completion: a failing job here blocks merge.
#
# Jobs:
#   unit   : vitest suite covering the 5 primitives + CommandEvalRunner
#   smoke  : real Vibium install + 5-primitive smoke-test.sh against live
#            public fixtures (httpbin.org)
#   eval   : build the AQE CLI and run `aqe eval run --skill qe-browser`
#            to exercise the CommandEvalRunner dispatch path end-to-end
#            against real Vibium (closes devil's-advocate gap G2)
# =============================================================================

name: qe-browser CI

on:
  pull_request:
    paths:
      - '.claude/skills/qe-browser/**'
      - 'src/validation/command-eval-runner.ts'
      - 'src/init/browser-engine-installer.ts'
      - 'src/cli/commands/eval.ts'
      - 'tests/unit/validation/command-eval-runner*.test.ts'
      - 'tests/unit/scripts/qe-browser-*.test.ts'
      - 'tests/unit/init/browser-engine-installer.test.ts'
      - '.github/workflows/test-qe-browser.yml'
  push:
    branches: [main]
    paths:
      - '.claude/skills/qe-browser/**'
      - 'src/validation/command-eval-runner.ts'
  workflow_dispatch: {}

# Least-privilege: this workflow only reads the repo and uploads an artifact.
# No writes to code, issues, PRs, or releases. actions/upload-artifact@v4
# does not require the `actions` write permission — it uses the ephemeral
# job token for the artifact API.
permissions:
  contents: read

# Single active run per branch/PR; queue newer pushes.
concurrency:
  group: qe-browser-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (CommandEvalRunner + primitives)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run qe-browser related unit tests
        run: |
          npx vitest run \
            tests/unit/validation/command-eval-runner.test.ts \
            tests/unit/validation/command-eval-runner-qe-browser.test.ts \
            tests/unit/init/browser-engine-installer.test.ts \
            tests/unit/scripts/qe-browser-assert.test.ts \
            tests/unit/scripts/qe-browser-batch.test.ts \
            tests/unit/scripts/qe-browser-check-injection.test.ts \
            tests/unit/scripts/qe-browser-fixtures-server.test.ts \
            tests/unit/scripts/qe-browser-intent-score.test.ts \
            tests/unit/scripts/qe-browser-unavailable-e2e.test.ts \
            tests/unit/scripts/qe-browser-vibium-lib.test.ts

  smoke:
    name: Smoke test (real Vibium + httpbin)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Vibium needs a Chrome/Chromium binary to drive. ubuntu-24.04 runners
      # have google-chrome preinstalled; this step locates it and exports
      # VIBIUM_BROWSER_PATH so subsequent steps pass it to vibium. Mirrors
      # the remediation that aqe init prints on Linux ARM64 hosts (see
      # browser-engine-installer.ts line ~152).
      - name: Discover browser path for Vibium
        run: |
          for bin in google-chrome google-chrome-stable chromium-browser chromium; do
            if command -v "$bin" >/dev/null 2>&1; then
              path="$(command -v "$bin")"
              echo "VIBIUM_BROWSER_PATH=$path" >> "$GITHUB_ENV"
              echo "Using browser: $path ($bin)"
              exit 0
            fi
          done
          echo "::error::No Chrome/Chromium binary found on runner"
          exit 1

      # Install Vibium the same way `aqe init` does. Keep this spec in sync
      # with DEFAULT_VIBIUM_SPEC in src/init/browser-engine-installer.ts.
      # The browser-engine-installer unit test guards that constant so a
      # drift here would be caught immediately by the unit job above.
      - name: Install Vibium (pinned spec)
        run: |
          npm install -g 'vibium@^26.3.18'
          vibium --version

      # TEMP diagnostic (remove before merge). Vibium's node wrapper is
      # swallowing the child-process stderr and the smoke test sees only
      # "exit 1, stdout: null, stderr: null". These probes surface the
      # real reason Vibium's Go binary crashes on GitHub runners.
      - name: DIAGNOSTIC — probe Vibium failure
        continue-on-error: true
        run: |
          set +e
          echo "=== VIBIUM_BROWSER_PATH ==="
          echo "$VIBIUM_BROWSER_PATH"
          ls -la "$VIBIUM_BROWSER_PATH"
          "$VIBIUM_BROWSER_PATH" --version

          echo "=== which vibium ==="
          which vibium
          ls -la "$(which vibium)"

          echo "=== node --version ==="
          node --version

          echo "=== vibium bin/cli.js head ==="
          VIBIUM_CLI="$(npm root -g)/vibium/bin/cli.js"
          ls -la "$VIBIUM_CLI" || true
          head -60 "$VIBIUM_CLI" || true

          echo "=== vibium --help ==="
          vibium --help 2>&1 | head -80

          echo "=== minimal eval with 2>&1 (captures swallowed stderr) ==="
          echo '{"script":"console.log(1)"}' | \
            vibium --headless eval --stdin --json 2>&1 | head -80
          echo "exit=$?"

          echo "=== try with --no-sandbox browser arg via env ==="
          VIBIUM_BROWSER_ARGS="--no-sandbox --disable-dev-shm-usage" \
            echo '{"script":"console.log(1)"}' | \
            vibium --headless eval --stdin --json 2>&1 | head -40
          echo "exit=$?"

          echo "=== strace first 200 syscalls (may show missing lib) ==="
          (strace -f -e trace=execve -s 128 -o /tmp/vibium.strace \
            bash -c "echo '{\"script\":\"console.log(1)\"}' | vibium --headless eval --stdin --json" 2>&1) || true
          head -100 /tmp/vibium.strace 2>/dev/null || echo "(no strace)"

          echo "=== /dev/shm size ==="
          df -h /dev/shm || true

          echo "=== chrome run directly ==="
          "$VIBIUM_BROWSER_PATH" --headless --no-sandbox --dump-dom about:blank 2>&1 | head -20
          echo "exit=$?"

      - name: Run qe-browser smoke test
        run: bash .claude/skills/qe-browser/scripts/smoke-test.sh
        env:
          # Smoke test uses public httpbin endpoints; set CI so the script
          # can short-circuit interactive retries if Vibium misbehaves.
          CI: 'true'

  eval:
    # End-to-end proof that `aqe eval run --skill qe-browser` actually
    # works: build the CLI, install Vibium, run the eval, assert exit 0.
    # Separate from `smoke` because it requires the TS build and exercises
    # the CommandEvalRunner dispatch path in src/cli/commands/eval.ts that
    # `smoke` bypasses.
    name: aqe eval run against real Vibium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build AQE CLI
        run: npm run build

      # See smoke job for rationale — Vibium needs an explicit browser
      # path. Ubuntu-24.04 runners have google-chrome preinstalled.
      - name: Discover browser path for Vibium
        run: |
          for bin in google-chrome google-chrome-stable chromium-browser chromium; do
            if command -v "$bin" >/dev/null 2>&1; then
              path="$(command -v "$bin")"
              echo "VIBIUM_BROWSER_PATH=$path" >> "$GITHUB_ENV"
              echo "Using browser: $path ($bin)"
              exit 0
            fi
          done
          echo "::error::No Chrome/Chromium binary found on runner"
          exit 1

      - name: Install Vibium (pinned spec)
        run: |
          npm install -g 'vibium@^26.3.18'
          vibium --version

      - name: Run aqe eval against qe-browser
        # The --model flag is required by the CLI but ignored by
        # CommandEvalRunner for command-mode suites. Exit 0 means all
        # 10 test cases passed against real Vibium.
        run: |
          node dist/cli/bundle.js eval run \
            --skill qe-browser \
            --model claude-3.5-sonnet \
            --output /tmp/qe-browser-eval.json
        env:
          CI: 'true'

      - name: Upload eval result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qe-browser-eval-result
          path: /tmp/qe-browser-eval.json
          if-no-files-found: warn
