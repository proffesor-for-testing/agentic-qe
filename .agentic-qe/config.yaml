# Agentic QE v3 Configuration
# Generated by aqe init
# 2026-03-11T09:00:21.749Z
#
# NOTE: Your customizations are PRESERVED when you run "aqe init" again.
# You do NOT need to re-run "aqe init" after editing this file - changes
# take effect immediately. The following settings are merged on reinstall:
#   - domains.enabled (custom domains like visual-accessibility)
#   - domains.disabled
#   - learning.enabled
#   - hooks.* preferences
#   - workers.enabled
#   - agents.maxConcurrent and defaultTimeout

version: "3.7.16"

project:
  name: "agentic-qe"
  root: "/workspaces/agentic-qe"
  type: "monorepo"

learning:
  enabled: true
  embeddingModel: "transformer"
  hnswConfig:
    M: 32
    efConstruction: 400
    efSearch: 200
  qualityThreshold: 0.7
  promotionThreshold: 3
  pretrainedPatterns: true

routing:
  mode: "ml"
  confidenceThreshold: 0.75
  feedbackEnabled: true

# ADR-092: Advisor Strategy Configuration
# The advisor helper script (advisor-call.cjs) reads these settings.
# If not set, it auto-detects from available API keys in your environment.
advisor:
  # provider: "openrouter"        # openrouter | claude | ollama (auto-detected if not set)
  # model: "anthropic/claude-opus-4"  # provider-specific model ID
  # maxUses: "3"                  # per-task advisor call cap
  redact: "strict"                # strict | balanced | off

workers:
  enabled:
    - "pattern-consolidator"
    - "routing-accuracy-monitor"
    - "coverage-gap-scanner"
    - "flaky-test-detector"
  intervals:
    pattern-consolidator: 1800000
    coverage-gap-scanner: 3600000
    flaky-test-detector: 7200000
    routing-accuracy-monitor: 900000
  maxConcurrent: 6
  daemonAutoStart: true

hooks:
  claudeCode: true
  preCommit: true
  ciIntegration: false

skills:
  install: true
  installV2: true
  installV3: true
  overwrite: false

domains:
  enabled:
    - "test-generation"
    - "test-execution"
    - "coverage-analysis"
    - "quality-assessment"
    - "defect-intelligence"
    - "requirements-validation"
    - "code-intelligence"
    - "security-compliance"
    - "contract-testing"
    - "visual-accessibility"
    - "chaos-resilience"
    - "learning-optimization"
    - "enterprise-integration"
  disabled:

agents:
  maxConcurrent: 15
  defaultTimeout: 60000
